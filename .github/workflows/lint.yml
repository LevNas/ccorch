name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout claudecode-plugins
        uses: actions/checkout@v4
        with:
          repository: LevNas/claudecode-plugins
          path: claudecode-plugins

      - name: Run SKILL.md linter
        run: bash claudecode-plugins/scripts/lint-skills.sh plugin
